<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laufey Concert Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Playfair Display', serif;
color:white;
text-align:center;

background-image:url("laufey.jpg");
background-size:cover;
background-position:center;
padding:20px;
}

.overlay{
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:20px;
max-width:500px;
width:100%;
}

h1{
font-size:clamp(24px,6vw,36px);
margin-bottom:10px;
}

p{
font-size:clamp(16px,4vw,20px);
margin-bottom:25px;
}

.buttons{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button{
font-size:18px;
padding:14px 26px;
border:none;
border-radius:14px;
cursor:pointer;
min-width:120px;
}

#yes{
background:#ff6fa3;
color:white;
}

#no{
background:#dddddd;
}

#message{
margin-top:20px;
font-size:clamp(18px,5vw,24px);
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div class="overlay">

<h1>Will you go to the Laufey concert with me? 🎻</h1>

<p>23 May 2026 • PIK 2</p>

<div class="buttons">
<button id="yes">Yes 💗</button>
<button id="no">No 🥲</button>
</div>

<div id="message"></div>

</div>

<canvas id="confetti"></canvas>

<audio id="music" loop>
<source src="lovergirl.mp3" type="audio/mpeg">
</audio>

<script>

const yes = document.getElementById("yes")
const no = document.getElementById("no")
const message = document.getElementById("message")
const music = document.getElementById("music")

/* play music after first interaction */

document.body.addEventListener("click",()=>{
music.play()
},{once:true})

/* CONFETTI */

const canvas = document.getElementById("confetti")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let pieces = []

function startConfetti(){

for(let i=0;i<200;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*8+2,
speed:Math.random()*3+1
})
}

animate()
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{
ctx.fillRect(p.x,p.y,p.size,p.size)
p.y += p.speed

if(p.y > canvas.height){
p.y = 0
}
})

requestAnimationFrame(animate)

}

/* YES button */

yes.addEventListener("click",()=>{

message.innerHTML="Yay!! It's a date 💖"

startConfetti()

fetch("https://api.telegram.org/bot8285623989:AAEIBLxKrhwXPLy5rSAB-g6hFu8QN4Rk_pc/sendMessage",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:"8449819949",
text:"She clicked YES to the Laufey concert date ❤️ "
})
})

})

/* NO button escapes */

function moveButton(){

const maxX = window.innerWidth - no.offsetWidth
const maxY = window.innerHeight - no.offsetHeight

const x = Math.random() * maxX
const y = Math.random() * maxY

no.style.position="absolute"
no.style.left = x+"px"
no.style.top = y+"px"

}

no.addEventListener("mouseover", moveButton)
no.addEventListener("touchstart", moveButton)

</script>

</body>
</html>
